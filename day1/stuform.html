<!DOCTYPE html>
<html>
    <!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <style>
        #ee{
            padding:50px;
            margin: 30px;
            margin-bottom: 30px;
            width:500px;
            border: none;
            border-radius: 20px;
            background-color: beige;
           
        }
        
body{
    background-image: url("1547464766phpSZ6dub.png");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
}

    </style>
</head>
<body >
    <center>
    <center id="ee">
   
   <nav>
   <h2 style="color:brown"> <a href="https://hit.edu.in/">Hindusthan Institute of Technology</a></h2>
   </nav>

    <h3 style="color: rgb(0, 0, 0)">Student Registration Form</h3>

    <form action="">

        <label >Student Name:</label>
        <input type="text" name="name" required placeholder="Enter your Name"><br><br>
<br>
        <label>Roll Number:</label>
        <input type="text" name="rollno" required placeholder="Enter your Roll No"><br><br>
<br>
        <label>Date of Birth:</label>
        <input type="date" name="dob"><br><br>
<br>
        <label>Gender:</label>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br>
<br>
        <label>Email:</label>
        <input type="email" name="email"><br><br>

    

        <label>Department:</label>
        <select name="department">
            <option value="">Select Department</option>
            <option value="CSE">Computer Science</option>
            <option value="IT">Information Technology</option>
            <option value="ECE">Electronics & Communication</option>
            <option value="EEE">Electrical & Electronics</option>
            <option value="MECH">Mechanical</option>
        </select>
        <br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"></textarea>
        <br><br>

        <label>Skills:</label><br>
        <input type="checkbox" name="skill" value="Java"> Java
        <input type="checkbox" name="skill" value="Python"> Python
        <input type="checkbox" name="skill" value="C"> C
        <input type="checkbox" name="skill" value="Web Development"> Web Development
        <br><br>

        <input type="submit" value="Register" style="background-color:rgb(120, 120, 226)" width="30px">
        <input type="reset" value="Clear" style="background-color: rgb(225, 91, 91)">
     
    </form>
</center>
</center>
</body>
</html>
</html>
