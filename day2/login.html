<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;

            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;

           display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box{
            width: 350px;
            padding: 30px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            color: purple;
        }

        input[type="text"],
        input[type="password"]{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        input[type="submit"]{
            width: 100%;
            padding: 10px;
            background: purple;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover{
            background: darkviolet;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Student login</h2>

    <form>
        <input type="text" placeholder="Enter Username" required>
        <br>

        <input type="password" placeholder="Enter Password" required>
        <br>

        <input type="submit" value="Login">
    </form>
    <p>
        New user?
        <a href="stuform.html">Sign in  </a>
    </p>
</div>

</body>
</html>
