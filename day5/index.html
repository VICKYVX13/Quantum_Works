<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Task & Schedule Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-40 shadow-xs">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-xl">
                <i data-lucide="check-square" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">TaskFlow</h1>
                <p class="text-xs text-slate-500">Professional Workspace</p>
            </div>
        </div>
        
        <div class="flex bg-slate-100 p-1 rounded-xl">
            <button id="tab-tasks" onclick="switchView('tasks')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg bg-white text-indigo-600 shadow-xs transition-all cursor-pointer">
                <i data-lucide="list-todo" class="w-4 h-4"></i> Tasks
            </button>
            <button id="tab-calendar" onclick="switchView('calendar')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-slate-600 hover:text-slate-900 transition-all cursor-pointer">
                <i data-lucide="calendar" class="w-4 h-4"></i> Calendar View
            </button>
        </div>

        <button onclick="openModal()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all shadow-md shadow-indigo-100 cursor-pointer">
            <i data-lucide="plus" class="w-4 h-4"></i> New Task
        </button>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 gap-6 grid grid-cols-1 lg:grid-cols-4">
        
        <aside class="lg:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Overview</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-indigo-50/50 p-4 rounded-xl">
                        <span class="block text-2xl font-bold text-indigo-600" id="stat-pending">0</span>
                        <span class="text-xs text-slate-500 font-medium">Pending</span>
                    </div>
                    <div class="bg-emerald-50/50 p-4 rounded-xl">
                        <span class="block text-2xl font-bold text-emerald-600" id="stat-completed">0</span>
                        <span class="text-xs text-slate-500 font-medium">Completed</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Categories</h3>
                <div class="space-y-1" id="category-filters">
                    </div>
            </div>
        </aside>

        <section class="lg:col-span-3 space-y-6">
            
            <div id="view-tasks" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <span id="current-filter-title">All Tasks</span>
                    </h2>
                </div>
                <div id="task-list" class="space-y-3">
                    </div>
            </div>

            <div id="view-calendar" class="hidden bg-white border border-slate-200 rounded-2xl p-6 shadow-xs">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-900" id="calendar-month-year"></h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-lg border border-slate-200 cursor-pointer"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-lg border border-slate-200 cursor-pointer"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2">
                    </div>
            </div>

        </section>
    </main>

    <div id="task-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 p-4 transition-all animate-fade-in">
        <div class="bg-white w-full max-w-md rounded-2xl border border-slate-200 shadow-2xl overflow-hidden transform scale-95 transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-900">Create New Task</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 cursor-pointer"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="task-form" onsubmit="handleAddTask(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Task Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition-all text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Category</label>
                        <select id="task-category" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 text-sm bg-white">
                            <option value="Work">💼 Work</option>
                            <option value="Personal">🏠 Personal</option>
                            <option value="Shopping">🛒 Shopping</option>
                            <option value="Health">❤️ Health</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Priority</label>
                        <select id="task-priority" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 text-sm bg-white">
                            <option value="Low">🟢 Low</option>
                            <option value="Medium" selected>🟡 Medium</option>
                            <option value="High">🔴 High</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Due Date</label>
                    <input type="date" id="task-date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 text-sm">
                </div>
                <div class="pt-2 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 border border-slate-200 cursor-pointer">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md shadow-indigo-100 cursor-pointer">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
